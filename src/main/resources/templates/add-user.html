<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="card">
            <a href="/" style="display: inline-flex; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; margin-bottom: 2rem; font-weight: 500; transition: color 0.2s;">
                <svg style="width: 1rem; height: 1rem; margin-right: 0.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Directory
            </a>

            <h2>Add New User</h2>
            
            <form action="#" th:action="@{/adduser}" th:object="${user}" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" th:field="*{name}" id="name" placeholder="E.g. John Doe">
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" th:field="*{email}" id="email" placeholder="john.doe@example.com">
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Add User</button>
            </form>
        </div>
    </div>
</body>
</html>
